[build-system]
requires = ["uv_build>=0.9,<0.12"]
build-backend = "uv_build"

[project]
name = "dbx-tools-api"
version = "0.1.0+rev9ed3aab"
requires-python = ">=3.10"
dependencies = [
    "dbx-tools-core @ file://${PROJECT_ROOT}/../dbx-tools-core",
    "httpx",
]

[tool.uv.build-backend]
module-root = "src"
module-name = "dbx_tools.api"

[tool.uv.sources]
dbx-tools-core = { workspace = true }
