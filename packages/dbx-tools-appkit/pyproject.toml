[build-system]
requires = ["uv_build>=0.9,<0.12"]
build-backend = "uv_build"

[project]
name = "dbx-tools-appkit"
version = "0.1.0+rev9ed3aab"
requires-python = ">=3.10"
dependencies = ["dbx-tools-core @ file://${PROJECT_ROOT}/../dbx-tools-core"]

[tool.uv.build-backend]
namespace = true
module-root = "src"
module-name = "dbx_tools.appkit"

[tool.uv.sources]
dbx-tools-core = { workspace = true }
