name: docs

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          package-manager-cache: true
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Generate docs from READMEs
        run: pnpm exec tsx docs/scripts/sync-readmes.mjs
      - name: Install docs dependencies
        run: pnpm --dir .docs-build/site install --lockfile=false
      - name: Generate TypeScript API docs
        run: node docs/scripts/generate-api-docs.mjs
      - name: Build docs
        run: pnpm --dir .docs-build/site build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .docs-build/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
