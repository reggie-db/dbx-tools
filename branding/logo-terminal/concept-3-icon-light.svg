<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="dbx.tools code brackets mark">
  <!-- Concept 3: </> code brackets. The left < and right > chevrons droop outward like the
       two halves of a waxed handlebar mustache, parted in the center by the / slash (the philtrum). -->
  <g fill="none" stroke="#E85C42" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- left chevron (left mustache half) -->
    <path d="M22 22 L11 33 L22 42"/>
    <!-- right chevron (right mustache half) -->
    <path d="M42 22 L53 33 L42 42"/>
    <!-- center slash / philtrum -->
    <path d="M36 18 L28 46" stroke="#C6412A"/>
  </g>
</svg>
