<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="dbx.tools monogram">
  <!-- Concept 1 - "The x Mustache" - LIGHT MODE (for white/light backgrounds).
       The two strokes of the x curl outward at the baseline like the waxed tips
       of a mustache. Casual viewers read a clean x; once pointed out, the
       mustache is obvious. The domain dot doubles as the mustache centre stud. -->
  <rect width="64" height="64" rx="14" fill="#FFF1ED"/>
  <g fill="none" stroke="#E85C42" stroke-width="5.5" stroke-linecap="round">
    <path d="M20 19 L44 43 Q47.5 46.5 50 43"/>
    <path d="M44 19 L20 43 Q16.5 46.5 14 43"/>
  </g>
  <circle cx="32" cy="50" r="3.2" fill="#FF7A5C"/>
</svg>
