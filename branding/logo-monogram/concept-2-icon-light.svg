<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="dbx monogram">
  <!-- Concept 2 - "The Dot Curl" - LIGHT MODE.
       A tight 'x' lettermark sits above a thin coral swash. The swash reads as a
       simple domain-underline, but its ends flick up symmetrically - a minimalist
       waxed mustache. The domain dot sits at the swash's centre dip. -->
  <rect width="64" height="64" rx="14" fill="#FFF1ED"/>
  <!-- x lettermark -->
  <g stroke="#E85C42" stroke-width="6" stroke-linecap="round">
    <line x1="22" y1="17" x2="42" y2="37"/>
    <line x1="42" y1="17" x2="22" y2="37"/>
  </g>
  <!-- mustache-curl underline: dips to centre, both tips flick upward -->
  <path d="M13 46 Q19 51 26 50 Q30 49.5 32 50 Q34 49.5 38 50 Q45 51 51 46"
        fill="none" stroke="#FF7A5C" stroke-width="3" stroke-linecap="round"/>
  <!-- domain dot at the centre of the curl -->
  <circle cx="32" cy="53" r="2.8" fill="#FF7A5C"/>
</svg>
